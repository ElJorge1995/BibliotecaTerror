<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0c12" />

    <!-- SEO básicos -->
    <title>Librum Tenebris · Archivo nocturno de horror y terror clásico</title>

    <meta name="author" content="Librum Tenebris" />
    <meta name="keywords" content="biblioteca, terror, horror, libros, literatura, préstamos, recomendaciones, novedades" />
    <link rel="canonical" href="https://librumtenebris.com/" />

    <!-- Iconos -->
    <link rel="icon" type="image/svg+xml" href="/ghost-logo.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/ghost-logo.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Librum Tenebris" />
    <meta property="og:title" content="Librum Tenebris · Archivo nocturno de horror y terror clásico" />
    <meta property="og:description" content="Biblioteca digital de literatura de terror y horror. Explora obras clásicas y modernas, guarda favoritos y reserva préstamos en Librum Tenebris." />
    <meta property="og:url" content="https://librumtenebris.com/" />
    <meta property="og:image" content="https://librumtenebris.com/og-image.png" />
    <meta property="og:image:width" content="1424" />
    <meta property="og:image:height" content="752" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Librum Tenebris · Archivo nocturno de horror y terror clásico" />
    <meta name="twitter:description" content="Biblioteca digital de literatura de terror y horror. Explora obras clásicas y modernas, guarda favoritos y reserva préstamos en Librum Tenebris." />
    <meta name="twitter:image" content="https://librumtenebris.com/og-image.png" />

    <!-- Tipografías (Germania One para títulos + Grenze cuerpo, solo pesos usados, en una sola request) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Germania+One&family=Grenze:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <!-- Preconnect a CDN de portadas (archive.org) para acelerar la primera carga de imágenes -->
    <link rel="preconnect" href="https://archive.org" crossorigin />
    <link rel="dns-prefetch" href="https://archive.org" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "Librum Tenebris",
          "alternateName": "Archivo nocturno de horror",
          "url": "https://librumtenebris.com/",
          "description": "Biblioteca digital de literatura de terror y horror. Explora obras clásicas y modernas, guarda favoritos y reserva préstamos en Librum Tenebris.",
          "inLanguage": "es-ES",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://librumtenebris.com/buscar?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "name": "Librum Tenebris",
          "url": "https://librumtenebris.com/",
          "logo": "https://librumtenebris.com/ghost-logo.svg",
          "email": "contacto@bibliotecaterror.com",
          "sameAs": []
        }
      ]
    }
    </script>
